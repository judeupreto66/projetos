<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro - EcoHealth</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <body class="login-page"></body>

<div id="toast"></div>

<section class="login-container">

    <h1>🌱 Criar Conta</h1>

    <p class="login-text">
        Cadastre-se para acessar o sistema EcoHealth
    </p>

    <input
        type="text"
        id="nome"
        placeholder="Digite seu nome"
        required
    >

    <input
        type="email"
        id="email"
        placeholder="Digite seu email"
        required
    >

    <input
        type="password"
        id="senha"
        placeholder="Digite sua senha"
        required
    >

    <button onclick="cadastrar()">
        Criar conta
    </button>

    <p id="msg"></p>

    <p class="cadastro-link">

        Já possui conta?

        <a href="index.html">
            Entrar
        </a>

    </p>

</section>

<script src="script.js"></script>

</body>
</html>
